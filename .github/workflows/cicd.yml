name: Employee Management CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-management:v2 .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-management:v2

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/employee-app \
          employee-app=${{ secrets.DOCKER_USERNAME }}/employee-management:v2 \
          -n employee-app

          kubectl rollout status deployment/employee-app -n employee-app
