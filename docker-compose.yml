version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: employee_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - employee-network

  app:
    build:
      context: .

    container_name: employee-app

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    environment:
      NODE_ENV: production

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    command: npm start

    networks:
      - employee-network

volumes:
  postgres_data:

networks:
  employee-network:
    driver: bridge
