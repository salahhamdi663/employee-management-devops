<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">

        <span class="navbar-brand fw-bold">
            <i class="fa-solid fa-users"></i>
            Employee Dashboard
        </span>

    </div>
</nav>

<div class="container mt-4">

    <div class="row g-3 text-center">

        <div class="col-lg-3 col-md-6">

            <div class="card shadow dashboard-card">

                <div class="card-body">

                    <i class="fa-solid fa-users fa-2x text-primary mb-3"></i>

                    <h2 id="totalEmployees">0</h2>

                    <p>Total Employees</p>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card shadow dashboard-card">

                <div class="card-body">

                    <i class="fa-solid fa-user-check fa-2x text-success mb-3"></i>

                    <h2 id="activeEmployees">0</h2>

                    <p>Active</p>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card shadow dashboard-card">

                <div class="card-body">

                    <i class="fa-solid fa-user-xmark fa-2x text-danger mb-3"></i>

                    <h2 id="inactiveEmployees">0</h2>

                    <p>Inactive</p>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="card shadow dashboard-card">

                <div class="card-body">

                    <i class="fa-solid fa-building fa-2x text-warning mb-3"></i>

                    <h2 id="departments">0</h2>

                    <p>Departments</p>

                </div>

            </div>

        </div>

    </div>

</div>

<div class="container mt-4">

    <div class="row mb-4">

        <div class="col-md-8">

            <input
                class="form-control form-control-lg"
                id="search"
                placeholder="Search employee..."
                onkeyup="searchUsers()">

        </div>

        <div class="col-md-4">

            <button
                class="btn btn-success w-100 btn-lg"
                data-bs-toggle="modal"
                data-bs-target="#addModal">

                <i class="fa-solid fa-user-plus"></i>

                Add Employee

            </button>

        </div>

    </div>

    <div class="row" id="users"></div>

</div>


<div class="modal fade" id="addModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h4>Add Employee</h4>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input id="name" class="form-control mb-3" placeholder="Name">

<input id="email" class="form-control mb-3" placeholder="Email">

<input id="age" class="form-control mb-3" placeholder="Age">

<select id="department" class="form-select mb-3">

    <option value="IT">IT</option>

    <option value="HR">HR</option>

    <option value="Finance">Finance</option>

    <option value="Sales">Sales</option>

    <option value="Operations">Operations</option>

</select>

<input id="position"

class="form-control mb-3"

placeholder="Position">

<select id="status"

class="form-select mb-3">

<option value="Active">

Active

</option>

<option value="Inactive">

Inactive

</option>

</select>
<label class="form-label">Employee Image</label>

<input
    type="file"
    id="image"
    class="form-control"
    accept="image/*">
</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="addUser()">

Save

</button>

</div>

</div>

</div>

</div>

<footer class="text-center mt-5 mb-4">

    <hr>

    <h6>Employee Management System v1.1</h6>

    <p class="text-muted">

        Powered by Node.js • Docker • Kubernetes

    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="js/app.js"></script>

</body>

</html>
