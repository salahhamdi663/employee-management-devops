<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">

        <span class="navbar-brand fw-bold">
            <i class="fa-solid fa-users"></i>
            Employee Dashboard
        </span>

    </div>
</nav>

<div class="container mt-5">

    <div class="row mb-4">

        <div class="col-md-8">

            <input
                class="form-control form-control-lg"
                id="search"
                placeholder="Search employee..."
                onkeyup="searchUsers()">

        </div>

        <div class="col-md-4">

            <button
                class="btn btn-success w-100 btn-lg"
                data-bs-toggle="modal"
                data-bs-target="#addModal">

                <i class="fa-solid fa-user-plus"></i>

                Add Employee

            </button>

        </div>

    </div>

    <div class="row" id="users"></div>

</div>


<div class="modal fade" id="addModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h4>Add Employee</h4>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input id="name" class="form-control mb-3" placeholder="Name">

<input id="email" class="form-control mb-3" placeholder="Email">

<input id="age" class="form-control mb-3" placeholder="Age">

<input id="image" class="form-control mb-3" placeholder="Image URL">

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="addUser()">

Save

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

</body>

</html>
